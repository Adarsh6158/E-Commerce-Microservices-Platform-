server:
  port: 8088

spring:
  application:
    name: payment-service

  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5435}/${POSTGRES_DB:payment_db}
    username: ${POSTGRES_USER:payment_user}
    password: ${POSTGRES_PASSWORD:payment_secret_pwd}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: payment-service-saga
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        isolation.level: read_committed
        spring.json.trusted.packages: "*"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

    listener:
      ack-mode: manual

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: payment-service

logging:
  level:
    com.ecommerce.payment_service: DEBUG
    org.springframework.r2dbc: INFO
    org.springframework.kafka: INFO