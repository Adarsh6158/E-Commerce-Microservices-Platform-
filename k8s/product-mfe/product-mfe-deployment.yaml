apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-mfe
  namespace: ecommerce
  labels:
    app: product-mfe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-mfe
  template:
    metadata:
      labels:
        app: product-mfe
    spec:
      containers:
      - name: product-mfe
        image: ecommerce/product-mfe:latest
        ports:
        - containerPort: 3001
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 15
