name: Backend CI

on:
  push:
    branches: [ "main", "master", "ft**", "fb**" ]
  pull_request:
    branches: [ "main", "master", "ft**", "fb**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - Backend/analytics-service
          - Backend/auth-service
          - Backend/cart-service
          - Backend/catalog-service
          - Backend/inventory-service
          - Backend/notification-service
          - Backend/order-service
          - Backend/payment-service
          - Backend/pricing-service
          - Backend/search-service
          - Gateway
          - Processors/Kafka-Processors
          - Processors/Spark-Jobs

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Start Infrastructure
      working-directory: ./Infra
      run: |
        docker compose up -d
        sleep 45 # Wait for services to initialize

    - name: Build and Test ${{ matrix.service }}
      working-directory: ./${{ matrix.service }}
      run: mvn -B clean verify

    - name: Verify Docker Build
      if: hashFiles(format('{0}/Dockerfile', matrix.service)) != ''
      working-directory: ./${{ matrix.service }}
      run: docker build -t ${{ matrix.service }}:test .

    - name: Stop Infrastructure
      if: always()
      working-directory: ./Infra
      run: docker compose down -v
