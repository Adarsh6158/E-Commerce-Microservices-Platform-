name: Frontend CI

on:
  push:
    branches: [ "main", "master", "ft**", "fb**" ]
  pull_request:
    branches: [ "main", "master", "ft**", "fb**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mfe:
          - FrontEnd/admin-mfe
          - FrontEnd/cart-mfe
          - FrontEnd/order-mfe
          - FrontEnd/product-mfe
          - FrontEnd/search-mfe
          - FrontEnd/shared/design-system
          - FrontEnd/shell

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./${{ matrix.mfe }}/package-lock.json

    - name: Install Dependencies
      working-directory: ./${{ matrix.mfe }}
      run: npm ci

    - name: Run NPM Audit for Vulnerabilities
      working-directory: ./${{ matrix.mfe }}
      run: npm audit --audit-level=high || echo "Audit found vulnerabilities, check logs."

    - name: Run Linter
      working-directory: ./${{ matrix.mfe }}
      run: npm run lint --if-present

    - name: Run Tests
      working-directory: ./${{ matrix.mfe }}
      run: npm run test --if-present

    - name: Build
      working-directory: ./${{ matrix.mfe }}
      run: npm run build --if-present
